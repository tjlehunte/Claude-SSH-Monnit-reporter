name: Publish reports to Pages

# Deliberately NOT triggered by `on: push` - the 4 report workflows push using
# the default GITHUB_TOKEN, and GitHub suppresses push-triggered workflow runs
# for pushes made with that token (loop prevention), so a push trigger here
# would silently never fire. workflow_run is exempt from that suppression.
on:
  workflow_run:
    workflows:
      - "Daily sensor report"
      - "Weekly sensor report"
      - "Daily GivenEnergy report"
      - "Weekly GivenEnergy report"
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Copies only the 4 latest.html files - deliberately excludes data/,
      # scripts/, and dated historical snapshots, since Pages here should
      # only ever expose the finished reports, not the raw underlying data.
      - name: Build curated site
        run: |
          mkdir -p _site/monnit/weekly _site/givenergy/weekly
          cp Monnit/reports/latest.html _site/monnit/index.html
          cp Monnit/reports/weekly/latest.html _site/monnit/weekly/index.html
          cp GivenEnergy/reports/latest.html _site/givenergy/index.html
          cp GivenEnergy/reports/weekly/latest.html _site/givenergy/weekly/index.html
          cat > _site/index.html <<'EOF'
          <!doctype html>
          <html><head><meta charset="utf-8"><title>Reports</title>
          <style>
          body { font-family: -apple-system, Segoe UI, Arial, sans-serif; max-width: 600px; margin: 3rem auto; padding: 0 1rem; color: #1a1a1a; }
          a { display: block; margin: 0.9rem 0; font-size: 1.15rem; }
          </style></head>
          <body>
          <h1>Reports</h1>
          <a href="monnit/">Monnit &mdash; daily sensor report</a>
          <a href="monnit/weekly/">Monnit &mdash; weekly sensor report</a>
          <a href="givenergy/">GivenEnergy &mdash; daily energy report</a>
          <a href="givenergy/weekly/">GivenEnergy &mdash; weekly energy report</a>
          </body></html>
          EOF

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
